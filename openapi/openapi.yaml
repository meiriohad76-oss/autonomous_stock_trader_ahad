openapi: 3.1.0
info:
  title: Sentiment Analyst API
  version: 0.1.0
  summary: Contract for the Sentiment Analyst and Fundamental Analyst MVP server.
servers:
  - url: http://127.0.0.1:3000
paths:
  /api/health:
    get:
      summary: Health and freshness snapshot.
      responses:
        "200":
          description: Health payload.
  /api/config:
    get:
      summary: Dashboard and universe configuration.
      responses:
        "200":
          description: Config payload.
  /api/fundamentals/dashboard:
    get:
      summary: Fundamental Analyst dashboard snapshot with sectors, company leaderboard, and recent changes.
      parameters:
        - in: query
          name: sector
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: minConfidence
          schema:
            type: number
            minimum: 0
            maximum: 1
        - in: query
          name: onlyChanged
          schema:
            type: boolean
      responses:
        "200":
          description: Fundamental dashboard snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundamentalsDashboardSnapshot"
  /api/fundamentals/changes:
    get:
      summary: Recent fundamental change events for the live feed.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Fundamental change events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FundamentalChangeEvent"
  /api/fundamentals/storage/summary:
    get:
      summary: Materialized warehouse row counts for the Fundamental Analyst persistence view.
      responses:
        "200":
          description: Fundamental warehouse summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundamentalStorageSummary"
  /api/fundamentals/storage/ticker/{ticker}:
    get:
      summary: Materialized warehouse rows for one ticker across coverage, facts, features, scores, and states.
      parameters:
        - in: path
          name: ticker
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Fundamental warehouse ticker slice.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundamentalStorageTicker"
  /api/fundamentals/storage/ticker/{ticker}/filings:
    get:
      summary: Filing history for one ticker from the materialized fundamentals warehouse.
      parameters:
        - in: path
          name: ticker
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Recent filing history for the ticker.
  /api/fundamentals/storage/ticker/{ticker}/facts/{canonicalField}:
    get:
      summary: Canonical fact series history for one ticker from the materialized fundamentals warehouse.
      parameters:
        - in: path
          name: ticker
          required: true
          schema:
            type: string
        - in: path
          name: canonicalField
          required: true
          schema:
            type: string
        - in: query
          name: periodType
          schema:
            type: string
            enum: [quarterly, annual]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Canonical fact series for the ticker and field.
  /api/fundamentals/ticker/{ticker}:
    get:
      summary: Detailed factor pack, confidence breakdown, and filing context for one ticker.
      parameters:
        - in: path
          name: ticker
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Fundamental ticker detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundamentalTickerResponse"
        "404":
          description: Ticker not found.
  /api/fundamentals/sector/{sector}:
    get:
      summary: Sector-level attractiveness and leading companies within that sector.
      parameters:
        - in: path
          name: sector
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Fundamental sector detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundamentalSector"
        "404":
          description: Sector not found.
  /api/sentiment/watchlist:
    get:
      summary: Watchlist leaderboard and global state.
      parameters:
        - in: query
          name: window
          schema:
            type: string
            enum: [15m, 1h, 4h, 1d, 7d]
        - in: query
          name: label
          schema:
            type: string
            enum: [bullish, neutral, bearish]
        - in: query
          name: minConfidence
          schema:
            type: number
            minimum: 0
            maximum: 1
      responses:
        "200":
          description: Watchlist snapshot.
  /api/sentiment/ticker/{ticker}:
    get:
      summary: Ticker sentiment detail including provider-backed price history with synthetic fallback.
      parameters:
        - in: path
          name: ticker
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticker sentiment detail.
        "404":
          description: Ticker not found.
  /api/sentiment/sector/{sector}:
    get:
      summary: Sector sentiment detail.
      parameters:
        - in: path
          name: sector
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sector sentiment detail.
        "404":
          description: Sector not found.
  /api/news/recent:
    get:
      summary: Recent scored documents.
      parameters:
        - in: query
          name: ticker
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Recent scored document feed.
  /api/events/high-impact:
    get:
      summary: High impact and high confidence events.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Event list.
  /api/evidence-quality:
    get:
      summary: Evidence Quality Agent snapshot and recent evidence verdicts.
      parameters:
        - in: query
          name: ticker
          schema:
            type: string
        - in: query
          name: tier
          schema:
            type: string
            enum: [alert, watch, context, suppress]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Evidence quality summary and recent items.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceQualitySnapshot"
  /api/replay:
    post:
      summary: Replay the local sample event set into the live pipeline.
      responses:
        "202":
          description: Replay started.
  /api/stream:
    get:
      summary: Server-Sent Events stream for dashboard updates.
      responses:
        "200":
          description: Event stream.
components:
  schemas:
    EvidenceQualityItem:
      type: object
      properties:
        evidence_id:
          type: string
        doc_id:
          type: string
        score_id:
          type: string
        ticker:
          type: string
          nullable: true
        source_type:
          type: string
        source_name:
          type: string
        event_type:
          type: string
        freshness_score:
          type: number
        source_reliability_score:
          type: number
        classification_confidence:
          type: number
        duplication_score:
          type: number
        corroboration_score:
          type: number
        data_quality_label:
          type: string
          enum: [high_quality, needs_confirmation, stale, duplicate, low_signal, source_limited]
        display_tier:
          type: string
          enum: [alert, watch, context, suppress]
        downstream_weight:
          type: number
        explanation:
          type: string
    EvidenceQualitySnapshot:
      type: object
      properties:
        summary:
          type: object
        items:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceQualityItem"
    FundamentalChangeEvent:
      type: object
      properties:
        event_id:
          type: string
          format: uuid
        type:
          type: string
        ticker:
          type: string
        sector:
          type: string
        as_of:
          type: string
          format: date-time
        form_type:
          type: string
        filing_date:
          type: string
          format: date
        changes:
          type: array
          items:
            type: string
        confidence:
          type: number
        composite_fundamental_score:
          type: number
        score_delta_30d:
          type: number
        rating_label:
          type: string
      required:
        - event_id
        - type
        - ticker
        - sector
        - as_of
        - changes
        - confidence
        - composite_fundamental_score
    FundamentalScore:
      type: object
      properties:
        ticker:
          type: string
        company_name:
          type: string
        sector:
          type: string
        industry:
          type: string
        as_of:
          type: string
          format: date-time
        rank_global:
          type: integer
        rank_in_sector:
          type: integer
        composite_fundamental_score:
          type: number
        final_confidence:
          type: number
        quality_score:
          type: number
        growth_score:
          type: number
        valuation_score:
          type: number
        balance_sheet_score:
          type: number
        efficiency_score:
          type: number
        earnings_stability_score:
          type: number
        sector_score:
          type: number
        rating_label:
          type: string
        valuation_label:
          type: string
        direction_label:
          type: string
        regime_label:
          type: string
        score_delta_30d:
          type: number
        reason_codes:
          type: array
          items:
            type: string
        top_strengths:
          type: array
          items:
            type: string
        top_weaknesses:
          type: array
          items:
            type: string
        market_reference:
          type: object
      required:
        - ticker
        - company_name
        - sector
        - as_of
        - composite_fundamental_score
        - final_confidence
        - rating_label
    FundamentalSector:
      type: object
      properties:
        sector:
          type: string
        as_of:
          type: string
          format: date-time
        rank:
          type: integer
        growth_breadth:
          type: number
        profitability_strength:
          type: number
        revision_breadth:
          type: number
        relative_valuation:
          type: number
        macro_fit:
          type: number
        median_revenue_growth:
          type: number
        median_operating_margin:
          type: number
        median_roic:
          type: number
        median_pe_ttm:
          type: number
        sector_attractiveness_score:
          type: number
        leaders:
          type: array
          items:
            type: object
      required:
        - sector
        - as_of
        - rank
        - sector_attractiveness_score
        - leaders
    FundamentalTickerResponse:
      allOf:
        - $ref: "#/components/schemas/FundamentalScore"
        - type: object
          properties:
            factor_cards:
              type: array
              items:
                type: object
            confidence_breakdown:
              type: object
            metric_snapshot:
              type: object
            peer_percentiles:
              type: object
            market_reference:
              type: object
            score_history:
              type: array
              items:
                type: object
            filing_timeline:
              type: array
              items:
                type: object
          required:
            - factor_cards
            - confidence_breakdown
            - metric_snapshot
            - peer_percentiles
            - score_history
            - filing_timeline
    FundamentalsDashboardSnapshot:
      type: object
      properties:
        as_of:
          type: string
          nullable: true
        summary:
          type: object
          properties:
            coverage_count:
              type: integer
            sectors_covered:
              type: integer
            new_filings_today:
              type: integer
            average_confidence:
              type: number
            average_composite_score:
              type: number
            data_completeness:
              type: number
          required:
            - coverage_count
            - sectors_covered
            - new_filings_today
            - average_confidence
            - average_composite_score
            - data_completeness
        leaderboard:
          type: array
          items:
            $ref: "#/components/schemas/FundamentalScore"
        sectors:
          type: array
          items:
            $ref: "#/components/schemas/FundamentalSector"
        changes:
          type: array
          items:
            $ref: "#/components/schemas/FundamentalChangeEvent"
      required:
        - as_of
        - summary
        - leaderboard
        - sectors
        - changes
    FundamentalStorageSummary:
      type: object
      properties:
        coverage_universe:
          type: integer
        filing_events:
          type: integer
        financial_periods:
          type: integer
        financial_facts:
          type: integer
        market_reference:
          type: integer
        fundamental_features:
          type: integer
        fundamental_scores:
          type: integer
        fundamental_states:
          type: integer
        last_materialized_at:
          type: string
          nullable: true
      required:
        - coverage_universe
        - filing_events
        - financial_periods
        - financial_facts
        - market_reference
        - fundamental_features
        - fundamental_scores
        - fundamental_states
        - last_materialized_at
    FundamentalStorageTicker:
      type: object
      properties:
        coverage_universe:
          type: array
          items:
            type: object
        filing_events:
          type: array
          items:
            type: object
        financial_periods:
          type: array
          items:
            type: object
        financial_facts:
          type: array
          items:
            type: object
        market_reference:
          type: array
          items:
            type: object
        fundamental_features:
          type: array
          items:
            type: object
        fundamental_scores:
          type: array
          items:
            type: object
        fundamental_states:
          type: array
          items:
            type: object
      required:
        - coverage_universe
        - filing_events
        - financial_periods
        - financial_facts
        - market_reference
        - fundamental_features
        - fundamental_scores
        - fundamental_states
